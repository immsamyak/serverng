version: '3.8'

services:
  # ============================================
  # PostgreSQL - Main Platform Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: servermg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-servermg}
      POSTGRES_USER: ${POSTGRES_USER:-servermg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-servermg_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-servermg}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - servermg-network

  # ============================================
  # Redis - Caching & Queue
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: servermg-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_dev}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - servermg-network

  # ============================================
  # MongoDB - User Database Engine
  # ============================================
  mongodb:
    image: mongo:7
    container_name: servermg-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-mongo_dev}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - servermg-network

  # ============================================
  # MySQL - User Database Engine
  # ============================================
  mysql:
    image: mysql:8
    container_name: servermg-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-mysql_dev}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - servermg-network

  # ============================================
  # API - NestJS Backend
  # ============================================
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: servermg-api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-servermg}:${POSTGRES_PASSWORD:-servermg_dev}@postgres:5432/${POSTGRES_DB:-servermg}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_dev}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_jwt_refresh_change_me}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      AGENT_SECRET: ${AGENT_SECRET:-dev_agent_secret}
      API_PORT: 4000
    ports:
      - "${API_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - servermg-network

  # ============================================
  # Dashboard - Next.js Frontend
  # ============================================
  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    container_name: servermg-dashboard
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    depends_on:
      - api
    networks:
      - servermg-network

  # ============================================
  # Agent - Server Management Agent
  # ============================================
  agent:
    build:
      context: .
      dockerfile: apps/agent/Dockerfile
    container_name: servermg-agent
    restart: unless-stopped
    privileged: true
    environment:
      AGENT_PORT: 4001
      AGENT_SECRET: ${AGENT_SECRET:-dev_agent_secret}
      API_URL: http://api:4000/api
    ports:
      - "${AGENT_PORT:-4001}:4001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/nginx:/etc/nginx
      - agent_data:/data
    depends_on:
      - api
    networks:
      - servermg-network

  # ============================================
  # Prometheus - Metrics Collection
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: servermg-prometheus
    restart: unless-stopped
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - servermg-network

  # ============================================
  # Grafana - Monitoring Dashboard
  # ============================================
  grafana:
    image: grafana/grafana:latest
    container_name: servermg-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./infrastructure/grafana/dashboards:/etc/grafana/provisioning/dashboards
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      - prometheus
    networks:
      - servermg-network

  # ============================================
  # Nginx - Reverse Proxy
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: servermg-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./infrastructure/nginx/conf.d:/etc/nginx/conf.d
      - ./infrastructure/ssl/certs:/etc/nginx/ssl
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
      - dashboard
    networks:
      - servermg-network

volumes:
  postgres_data:
  redis_data:
  mongo_data:
  mysql_data:
  prometheus_data:
  grafana_data:
  agent_data:
  nginx_logs:

networks:
  servermg-network:
    driver: bridge
    name: servermg-network
